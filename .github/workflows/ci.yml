name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[api,mcp,dev]" && pip install -r docs/requirements.txt
      - run: python scripts/generate_http_endpoints_docs.py
      - run: python scripts/generate_docs_examples.py --check
      - run: sphinx-build -E -W -b html docs docs/_build/html
      - run: sphinx-build -b linkcheck -j 1 docs docs/_build/linkcheck
      - run: '! rg -n "TODO|TBD|FIXME" docs --glob ''!readthedocs-public-docs-improvement-plan.md'''

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[api,mcp,dev]"
      - run: pytest -q -m "not integration" --cov=disclosure_alpha --cov-fail-under=75
        env:
          EMBEDDING_BACKEND: tfidf
      # Advisory until dictionary cohort stabilizes; does not block merge on shift warnings.
      - name: Dictionary distribution shift (non-blocking)
        run: python scripts/validate_dictionary_shift.py --allow-fail
        continue-on-error: true
